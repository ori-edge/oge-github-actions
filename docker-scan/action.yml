name: "Docker scan"
description: >
  Checks out the caller's repo, builds a Docker image from the Dockerfile, and
  runs Trivy vulnerability scanner. Fails on unfixed CRITICAL or HIGH CVEs.
inputs:
  buildContext:
    description: "docker build context"
    default: "."
    required: false
runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Build an image from Dockerfile
      shell: bash
      run: docker build -t ${{ github.repository }}:${{ github.sha }} ${{ inputs.buildContext }}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: "${{ github.repository }}:${{ github.sha }}"
        format: "table"
        exit-code: "1"
        ignore-unfixed: true
        vuln-type: "os,library"
        severity: "CRITICAL,HIGH"
