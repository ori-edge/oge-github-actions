name: tag-helm-release CI

on:
  push:
    branches: [main]
    paths:
      - tag-helm-release/**
  pull_request:
    branches: [main]
    paths:
      - tag-helm-release/**

defaults:
  run:
    working-directory: tag-helm-release

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tag-helm-release/package-lock.json

      - run: npm ci

      - run: npm test

  build:
    name: Build dist
    runs-on: ubuntu-latest
    # Only commit dist/ on pushes to main, not on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tag-helm-release/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Commit dist if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore(tag-helm-release): rebuild dist [skip ci]"
          git push