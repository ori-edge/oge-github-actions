name: Go unit test

on:
  workflow_call:
    inputs:
      goVersion:
        description: "version of go to use (deprecated: use mise.toml instead)"
        default: "stable"
        required: false
        type: string
      unitTestCommand:
        description: "unit test command to run using bash"
        default: "make race"
        required: false
        type: string
      uploadToCodecov:
        description: "flag to indicate if the results should be uploaded to codecov"
        default: true
        required: false
        type: boolean
      coverageFilePath:
        description: "path to coverage report generated by go test"
        default: "./artifacts/coverage.txt"
        required: false
        type: string
      runsOn:
        description: "github actions runner to use for this action"
        default: "ubuntu-latest"
        required: false
        type: string
      loginDocker:
        description: "the flag indicating if the unit tests need to access a private docker registry"
        default: false
        required: false
        type: boolean
      dockerRegistry:
        description: "name of the docker registry"
        required: false
        default: "quay.io"
        type: string
    secrets:
      CODECOV_TOKEN:
        description: "codecov report upload token"
        required: false
      REGISTRY_USERNAME:
        description: "docker registry username"
        required: false
      REGISTRY_PASSWORD:
        description: "docker registry password"
        required: false
      GH_TOKEN:
        description: "github PAT to use for pulling dependencies"
        required: false

jobs:
  unit-test:
    runs-on: ${{ inputs.runsOn }}
    env:
      MISE_TOML_TEMPLATE: |-
        [tools]
        go =
      MISE_GO_SET_GOBIN: 'false'
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          mise_toml: ${{ case(hashFiles('mise.toml') == '', format('{0} "{1}"', env.MISE_TOML_TEMPLATE, case(inputs.goVersion == 'stable', 'latest', inputs.goVersion)), '') }}
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache-dependency-path: |
            go.sum
            mise.toml
      - name: Configure GitHub authentication
        env:
          HAS_TOKEN: ${{ secrets.GH_TOKEN != '' }}
        if: env.HAS_TOKEN == 'true'
        run: |
          git config --global url."https://${{ secrets.GH_TOKEN }}@github.com/ori-edge/".insteadOf "https://github.com/ori-edge/"

      - name: Login to docker registry
        if: ${{ inputs.loginDocker }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.dockerRegistry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Unit Test
        run: bash -c "${{ inputs.unitTestCommand }}"
      - name: Upload Coverage Report
        if: ${{ inputs.uploadToCodecov }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ${{ inputs.coverageFilePath }}
          flags: unittests
          name: codecov-umbrella
