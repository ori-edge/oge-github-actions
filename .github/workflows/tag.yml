name: Semver tag

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        description: "Bot token for tag push; falls back to github.token if not provided"
        required: false
    outputs:
      version:
        description: "Tagged version (e.g. '1.2.3'), empty if nothing to release"
        value: ${{ jobs.tag.outputs.version }}

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - id: semver
        uses: ori-edge/oge-github-actions/auto-semver@main
        with:
          tag-parent-depth: '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - if: steps.semver.outputs.tag != ''
        uses: ori-edge/oge-github-actions/tag@main
        with:
          tags: ${{ steps.semver.outputs.tag }},${{ steps.semver.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
