name: Semver tag

on:
  workflow_call:
    inputs:
      tag-parent-depth:
        description: "First-parent hops from tag commit to main (0 = direct-main, 1 = fishbone)"
        required: false
        default: "0"
        type: string
    secrets:
      GH_TOKEN:
        description: "Bot token for tag push; falls back to github.token if not provided"
        required: false
    outputs:
      version:
        description: "Tagged version (e.g. '1.2.3'), empty if nothing to release"
        value: ${{ jobs.tag.outputs.version }}

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - id: semver
        uses: ./auto-semver
        with:
          tag-parent-depth: ${{ inputs.tag-parent-depth }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - if: steps.semver.outputs.tag != ''
        uses: ./tag
        with:
          tags: ${{ steps.semver.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
