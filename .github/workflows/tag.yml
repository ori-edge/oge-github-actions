name: Semver tag

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        description: "Bot token for tag push; falls back to github.token if not provided"
        required: false
    outputs:
      version:
        description: "Tagged version (e.g. '1.2.3'), empty if nothing to release"
        value: ${{ jobs.tag.outputs.version }}

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - name: Get workflow ref
        id: wf-ref
        run: echo "ref=${GITHUB_WORKFLOW_REF##*@}" >> $GITHUB_OUTPUT
        env:
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}

      - uses: actions/checkout@v6
        with:
          repository: ori-edge/oge-github-actions
          ref: ${{ steps.wf-ref.outputs.ref }}

      - id: semver
        uses: ./auto-semver
        with:
          tag-parent-depth: '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - if: steps.semver.outputs.tag != ''
        uses: ./tag
        with:
          tags: ${{ steps.semver.outputs.tag }},${{ steps.semver.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
