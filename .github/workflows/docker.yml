name: Docker build and push

on:
  workflow_call:
    inputs:
      buildArgs:
        description: "docker build args (see --build-arg in docker docs)"
        default: ""
        required: false
        type: string
      buildContext:
        description: "docker build context"
        default: "."
        required: false
        type: string
      dockerFile:
        description: "path to the Dockerfile"
        required: false
        default: ""
        type: string
      dockerRegistry:
        description: "name of the docker registry"
        required: false
        default: "quay.io"
        type: string
      dockerRepo:
        description: "name of the docker repository"
        required: false
        default: "oriedge"
        type: string
      imageName:
        description: "name of the docker image to be built ({repo}/{name}:{version})"
        required: true
        type: string
      imageVersion:
        description: "version of the docker image to be built ({repo}/{name}:{version}) (Overrides image mode)"
        required: false
        default: ""
        type: string
      platforms:
        description: "the list of platforms/architectures to create docker images for"
        default: "linux/amd64,linux/arm64"
        required: false
        type: string
      push:
        description: "the flag indicating if the image should be pushed to the registry or not"
        default: true
        required: false
        type: boolean
      runsOn:
        description: "github actions runner to use for this action"
        default: "ubuntu-latest"
        required: false
        type: string
    secrets:
      REGISTRY_USERNAME:
        description: "docker registry username"
        required: false
      REGISTRY_PASSWORD:
        description: "docker registry password"
        required: false

jobs:
  docker:
    runs-on: ${{ inputs.runsOn }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to docker registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.dockerRegistry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Checkout oge-github-actions
        uses: actions/checkout@v6
        with:
          repository: ori-edge/oge-github-actions
          ref: ${{ github.workflow_sha }}
          path: _oge-github-actions

      - name: Resolve image version
        id: cv
        uses: ./_oge-github-actions/compute-version
        with:
          version: ${{ inputs.imageVersion }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Set IMAGE_VERSION
        run: echo "IMAGE_VERSION=${{ steps.cv.outputs.version }}" >> $GITHUB_ENV

      - name: Generate build args
        run: |
          BUILD_ARGS=$(echo "${{ inputs.buildArgs }}" | sed "s/version=version/version=${{ env.IMAGE_VERSION }}/g")
          echo "BUILD_ARGS=${BUILD_ARGS}"
          echo "BUILD_ARGS=${BUILD_ARGS}" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.buildContext }}
          file: ${{ inputs.dockerFile }}
          build-args: ${{ env.BUILD_ARGS }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ inputs.dockerRegistry }}/${{ inputs.dockerRepo }}/${{ inputs.imageName }}:${{ env.IMAGE_VERSION }}
