name: Docker build and push

on:
  workflow_call:
    inputs:
      buildArgs:
        description: "docker build args (see --build-arg in docker docs)"
        default: ""
        required: false
        type: string
      buildContext:
        description: "docker build context"
        default: "."
        required: false
        type: string
      dockerFile:
        description: "path to the Dockerfile"
        required: false
        default: ""
        type: string
      dockerRegistry:
        description: "name of the docker registry"
        required: false
        default: "quay.io"
        type: string
      dockerRepo:
        description: "name of the docker repository"
        required: false
        default: "oriedge"
        type: string
      imageName:
        description: "name of the docker image to be built ({repo}/{name}:{version})"
        required: true
        type: string
      imageVersion:
        description: "version of the docker image to be built ({repo}/{name}:{version}) (Overrides image mode)"
        required: false
        default: ""
        type: string
      platforms:
        description: "the list of platforms/architectures to create docker images for"
        default: "linux/amd64,linux/arm64"
        required: false
        type: string
      push:
        description: "the flag indicating if the image should be pushed to the registry or not"
        default: true
        required: false
        type: boolean
      runsOn:
        description: "github actions runner to use for this action"
        default: "ubuntu-latest"
        required: false
        type: string
    secrets:
      REGISTRY_USERNAME:
        description: "docker registry username"
        required: false
      REGISTRY_PASSWORD:
        description: "docker registry password"
        required: false

jobs:
  docker:
    runs-on: ${{ inputs.runsOn }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: src

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to docker registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.dockerRegistry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Debug runner filesystem
        id: debug-oge
        run: |
          echo "=== env vars ==="
          echo "GITHUB_WORKFLOW_REF=${GITHUB_WORKFLOW_REF}"
          echo "GITHUB_WORKFLOW_SHA=${GITHUB_WORKFLOW_SHA}"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          echo "RUNNER_WORKSPACE=${RUNNER_WORKSPACE}"
          echo "RUNNER_TOOL_CACHE=${RUNNER_TOOL_CACHE}"
          echo "RUNNER_TEMP=${RUNNER_TEMP}"
          echo "=== /home/runner/work ==="
          ls /home/runner/work/ 2>/dev/null || echo "(empty)"
          echo "=== /home/runner/work/_actions (top level) ==="
          ls /home/runner/work/_actions/ 2>/dev/null || echo "(no _actions dir)"
          echo "=== /home/runner/work/_actions/ori-edge ==="
          ls /home/runner/work/_actions/ori-edge/ 2>/dev/null || echo "(no ori-edge dir)"
          echo "=== find oge-github-actions dirs ==="
          find /home/runner -maxdepth 10 -name "oge-github-actions" -type d 2>/dev/null | head -10 || echo "(not found)"
          echo "=== find auto-semver dirs ==="
          find /home/runner -maxdepth 10 -name "auto-semver" -type d 2>/dev/null | head -10 || echo "(not found)"
          # Try to locate and symlink without a new checkout
          OGE=$(find /home/runner -maxdepth 10 -name "auto-semver" -type d 2>/dev/null | grep "oge-github-actions" | head -1 | sed 's|/auto-semver$||')
          if [ -n "$OGE" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "path=$OGE" >> $GITHUB_OUTPUT
            echo "Found oge-github-actions at $OGE — will symlink"
            ln -s "$OGE" _oge-github-actions
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "path=" >> $GITHUB_OUTPUT
            echo "Not found via find — will checkout"
          fi

      - name: Checkout oge-github-actions
        if: steps.debug-oge.outputs.found != 'true'
        uses: actions/checkout@v6
        with:
          repository: ori-edge/oge-github-actions
          ref: ${{ env.GITHUB_WORKFLOW_SHA }}
          path: _oge-github-actions

      - name: Resolve image version
        id: cv
        uses: ./_oge-github-actions/compute-version
        with:
          version: ${{ inputs.imageVersion }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Set IMAGE_VERSION
        working-directory: src
        run: echo "IMAGE_VERSION=${{ steps.cv.outputs.version }}" >> $GITHUB_ENV

      - name: Generate build args
        working-directory: src
        run: |
          BUILD_ARGS=$(echo "${{ inputs.buildArgs }}" | sed "s/version=version/version=${{ env.IMAGE_VERSION }}/g")
          echo "BUILD_ARGS=${BUILD_ARGS}"
          echo "BUILD_ARGS=${BUILD_ARGS}" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: src/${{ inputs.buildContext }}
          file: ${{ inputs.dockerFile != '' && format('src/{0}', inputs.dockerFile) || '' }}
          build-args: ${{ env.BUILD_ARGS }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ inputs.dockerRegistry }}/${{ inputs.dockerRepo }}/${{ inputs.imageName }}:${{ env.IMAGE_VERSION }}
