name: Wait for deploy

on:
  workflow_call:
    inputs:
      version:
        description: "Expected deployed version. If not set, computed via compute-version action."
        required: false
        default: ""
        type: string
      url:
        description: "url to get currently deployed version"
        required: true
        type: string
      jq:
        description: "jq pattern to extract deployed version"
        required: false
        default: ".version"
        type: string
      runsOn:
        description: "github actions runner to use for this action"
        default: "ubuntu-latest"
        required: false
        type: string

jobs:
  wait-for-deploy:
    runs-on: ${{ inputs.runsOn }}
    steps:
      - name: Resolve expected version
        id: cv
        uses: ./compute-version
        with:
          version: ${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Wait for deploy
        run: |
          TAG=${{ steps.cv.outputs.version }}
          for i in $(seq 1 10)
          do
            VERSION=$(curl -s ${{ inputs.url }} | jq '${{ inputs.jq }}' | tr -d '"')
            sleep 60
            if [[ $VERSION == $TAG ]]
            then
               echo "$VERSION is released"
               break
            elif [[ i -eq 10 ]]
            then
               echo "$TAG has not been deployed"
               exit 1
            else
                echo "$VERSION is currently deployed, waiting for $TAG"
            fi
          done
