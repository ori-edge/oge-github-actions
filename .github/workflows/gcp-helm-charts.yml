name: Build helm charts and push to gcp

on:
  workflow_call:
    inputs:
      chartsPath:
        description: "path chart files (including glob pattern)"
        required: false
        default: "./charts/*"
        type: string
      gcpDestination:
        description: "gcp directory where the packaged chart will be uploaded"
        required: true
        type: string
      chartVersion:
        description: "Chart version. If not set, computed via compute-version action."
        required: false
        default: ""
        type: string
      runsOn:
        description: "github actions runner to use for this action"
        default: "ubuntu-latest"
        required: false
        type: string
    secrets:
      GCP_CREDENTIALS:
        description: "gcp credentials"
        required: true

jobs:
  gcp-helm-charts:
    runs-on: ${{ inputs.runsOn }}
    steps:
      - name: Checkout oge-github-actions
        uses: actions/checkout@v6
        with:
          repository: ori-edge/oge-github-actions
          ref: ${{ github.workflow_sha }}
          path: _oge-github-actions

      - name: Resolve chart version
        id: cv
        uses: ./_oge-github-actions/compute-version
        with:
          version: ${{ inputs.chartVersion }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: src

      - name: Helm tool installer
        uses: Azure/setup-helm@v5

      - name: Package Helm Chart
        working-directory: src
        run: |
          for dir in ${{ inputs.chartsPath }}; do
            if [ -d "$dir" ]; then
              helm package "$dir" --destination ./charts --version "${{ steps.cv.outputs.version }}"
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Push chart to GCP Cloud Storage
        uses: google-github-actions/upload-cloud-storage@v3
        with:
          path: src/charts
          glob: "*.tgz"
          process_gcloudignore: false
          destination: ${{ inputs.gcpDestination }}
          parent: false
