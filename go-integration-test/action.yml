name: "Go integration test"
description: >
  Checks out the caller's repo, sets up Go via mise, and runs Go integration tests.
  Pass secrets as env vars on the step: GH_TOKEN (private modules),
  REGISTRY_USERNAME + REGISTRY_PASSWORD (when loginToDockerRegistry is 'true'),
  CODECOV_TOKEN (when uploadToCodecov is 'true').
inputs:
  skip:
    description: "'true' to skip all steps (e.g. for dependabot)"
    default: "false"
    required: false
  goVersion:
    description: "version of go to use (deprecated: use mise.toml instead)"
    default: "stable"
    required: false
  loginToDockerRegistry:
    description: "'true' if integration tests need to access a private docker registry"
    default: "false"
    required: false
  dockerRegistry:
    description: "docker registry hostname"
    required: false
    default: "quay.io"
  setupCommand:
    description: "setup test command to run using bash"
    default: "make up"
    required: false
  testCommand:
    description: "integration test command to run using bash"
    default: "make integration"
    required: false
  uploadToCodecov:
    description: "'true' to upload coverage to Codecov"
    default: "true"
    required: false
  coverageFilePath:
    description: "path to coverage report generated by integration tests"
    default: "./artifacts/integration-coverage.txt"
    required: false
  buildArtifactName:
    description: "build artifact to download before running tests"
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Connect to Tailscale
      if: inputs.skip != 'true' && env.GOPROXY_TAILSCALE_AUTHKEY != ''
      uses: tailscale/github-action@v3
      with:
        authkey: ${{ env.GOPROXY_TAILSCALE_AUTHKEY }}

    - name: Check out
      if: inputs.skip != 'true'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download build artifact
      if: inputs.skip != 'true' && inputs.buildArtifactName != ''
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.buildArtifactName }}
        path: ${{ inputs.buildArtifactName }}/

    - name: Create mise.toml if missing
      if: inputs.skip != 'true' && hashFiles('mise.toml') == ''
      shell: bash
      run: |
        if [ "${{ inputs.goVersion }}" = "stable" ]; then
          printf '[tools]\ngo = "latest"\n' > mise.toml
        else
          printf '[tools]\ngo = "%s"\n' "${{ inputs.goVersion }}" > mise.toml
        fi

    - name: Setup mise
      if: inputs.skip != 'true'
      uses: jdx/mise-action@v4
      env:
        MISE_GO_SET_GOBIN: 'false'

    - name: Setup Go
      if: inputs.skip != 'true'
      uses: actions/setup-go@v6
      with:
        cache-dependency-path: |
          go.sum
          mise.toml

    - name: Configure GitHub authentication
      if: inputs.skip != 'true'
      shell: bash
      run: |
        if [ -n "${GH_TOKEN}" ]; then
          git config --global url."https://${GH_TOKEN}@github.com/ori-edge/".insteadOf "https://github.com/ori-edge/"
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to docker registry
      if: inputs.skip != 'true' && inputs.loginToDockerRegistry == 'true'
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.dockerRegistry }}
        username: ${{ env.REGISTRY_USERNAME }}
        password: ${{ env.REGISTRY_PASSWORD }}

    - name: Disable containerd image store
      if: github.actor != 'dependabot[bot]'
      shell: bash
      run: |
        sudo mkdir -p /etc/docker
        echo '{"features":{"containerd-snapshotter":false}}' | sudo tee /etc/docker/daemon.json
        sudo systemctl restart docker

    - name: Setup tests
      if: inputs.skip != 'true' && inputs.setupCommand != ''
      shell: bash
      run: bash -c "${{ inputs.setupCommand }}"

    - name: Run tests
      if: inputs.skip != 'true' && inputs.testCommand != ''
      shell: bash
      run: bash -c "${{ inputs.testCommand }}"

    - name: Upload Coverage Report
      if: inputs.uploadToCodecov == 'true'
      uses: codecov/codecov-action@v6
      with:
        token: ${{ env.CODECOV_TOKEN }}
        files: ${{ inputs.coverageFilePath }}
        flags: integration
        name: codecov-umbrella
