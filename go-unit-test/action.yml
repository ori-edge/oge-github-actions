name: "Go unit test"
description: >
  Checks out the caller's repo, sets up Go via mise, and runs Go unit tests.
  Pass secrets as env vars on the step: GH_TOKEN (private modules),
  REGISTRY_USERNAME + REGISTRY_PASSWORD (when loginDocker is 'true'),
  CODECOV_TOKEN (when uploadToCodecov is 'true').
inputs:
  goVersion:
    description: "version of go to use (deprecated: use mise.toml instead)"
    default: "stable"
    required: false
  unitTestCommand:
    description: "unit test command to run using bash"
    default: "make race"
    required: false
  uploadToCodecov:
    description: "'true' to upload coverage to Codecov"
    default: "true"
    required: false
  coverageFilePath:
    description: "path to coverage report generated by go test"
    default: "./artifacts/coverage.txt"
    required: false
  loginDocker:
    description: "'true' if unit tests need to access a private docker registry"
    default: "false"
    required: false
  dockerRegistry:
    description: "name of the docker registry"
    required: false
    default: "quay.io"
runs:
  using: composite
  steps:
    - name: Check out
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Create mise.toml if missing
      if: hashFiles('mise.toml') == ''
      shell: bash
      run: |
        if [ "${{ inputs.goVersion }}" = "stable" ]; then
          printf '[tools]\ngo = "latest"\n' > mise.toml
        else
          printf '[tools]\ngo = "%s"\n' "${{ inputs.goVersion }}" > mise.toml
        fi

    - name: Setup mise
      uses: jdx/mise-action@v4
      env:
        MISE_GO_SET_GOBIN: 'false'

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        cache-dependency-path: |
          go.sum
          mise.toml

    - name: Configure GitHub authentication
      shell: bash
      run: |
        if [ -n "${GH_TOKEN}" ]; then
          git config --global url."https://${GH_TOKEN}@github.com/ori-edge/".insteadOf "https://github.com/ori-edge/"
        fi

    - name: Login to docker registry
      if: inputs.loginDocker == 'true'
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.dockerRegistry }}
        username: ${{ env.REGISTRY_USERNAME }}
        password: ${{ env.REGISTRY_PASSWORD }}

    - name: Unit Test
      shell: bash
      run: bash -c "${{ inputs.unitTestCommand }}"

    - name: Upload Coverage Report
      if: inputs.uploadToCodecov == 'true'
      uses: codecov/codecov-action@v6
      with:
        token: ${{ env.CODECOV_TOKEN }}
        files: ${{ inputs.coverageFilePath }}
        flags: unittests
        name: codecov-umbrella
