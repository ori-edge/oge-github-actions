name: "Helm lint"
description: >
  Checks out the caller's repo, installs Helm, and runs helm lint (and optionally
  helm template) against the specified chart path.
inputs:
  chartPath:
    description: "path to the Helm chart directory"
    required: true
  helmVersion:
    description: "version of Helm to use"
    default: "latest"
    required: false
  runTemplate:
    description: "'true' to also run helm template to validate chart renders"
    default: "true"
    required: false
  releaseName:
    description: "release name to use for helm template"
    default: "test-release"
    required: false
  valueFiles:
    description: "comma-separated list of values files to use for helm template"
    required: false
    default: ""
  additionalLintArgs:
    description: "additional arguments to pass to helm lint"
    required: false
    default: ""
  additionalTemplateArgs:
    description: "additional arguments to pass to helm template"
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Check out
      uses: actions/checkout@v6

    - name: Set up Helm
      uses: azure/setup-helm@v5
      with:
        version: ${{ inputs.helmVersion }}

    - name: Helm lint
      shell: bash
      run: helm lint ${{ inputs.chartPath }} ${{ inputs.additionalLintArgs }}

    - name: Helm template
      if: inputs.runTemplate == 'true'
      shell: bash
      run: |
        ARGS="${{ inputs.additionalTemplateArgs }}"
        if [ -n "${{ inputs.valueFiles }}" ]; then
          IFS=',' read -ra FILES <<< "${{ inputs.valueFiles }}"
          for file in "${FILES[@]}"; do
            ARGS="$ARGS -f $file"
          done
        fi
        helm template ${{ inputs.releaseName }} ${{ inputs.chartPath }} $ARGS > /dev/null
